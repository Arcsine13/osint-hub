<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9D00FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="15" fill="#0a0a0f"/>
  <circle cx="50" cy="50" r="30" fill="none" stroke="url(#grad)" stroke-width="3" filter="url(#glow)"/>
  <circle cx="50" cy="50" r="15" fill="none" stroke="#39FF14" stroke-width="2" filter="url(#glow)"/>
  <circle cx="50" cy="50" r="5" fill="#00D4FF" filter="url(#glow)"/>
  <path d="M50 20 L50 35 M50 65 L50 80 M20 50 L35 50 M65 50 L80 50" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
</svg>
